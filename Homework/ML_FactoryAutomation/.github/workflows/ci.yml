name: CI/CD
on: [push, pull_request]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -v

  docker-build:
    name: Docker Build (배포 이미지 검증)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ml-factory-automation:ci .

  deploy:
    name: Deploy to Cloudtype
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Cloudtype은 GitHub 저장소를 연결하면 main 푸시 시 자동 빌드·배포(Dockerfile 감지).
      # 별도 토큰 배포가 필요하면 cloudtype/deploy-action 사용:
      #   - uses: cloudtype-github-actions/deploy@v1
      #     with: { token: ${{ secrets.CLOUDTYPE_TOKEN }}, project: <project>, stage: main }
      - run: echo "Cloudtype GitHub 연동으로 자동 배포 (DATABASE_URL=PostgreSQL 애드온)"
